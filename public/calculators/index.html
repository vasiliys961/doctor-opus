<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedCalculator</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- PWA Manifest -->
  <link rel="manifest" href="/calculators/manifest.json" />
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/calculators/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/calculators/icon-192.png" />
  <meta name="theme-color" content="#2563eb" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root">Loading...</div>
  <script type="text/babel">
    const { useState } = React;
    const { createRoot } = ReactDOM;
    // --- LUCIDE ICON STUBS ---
    const makeIcon = (d) => (props) => {
      const size = props.size || 24;
      const color = props.color || 'currentColor';
      return React.createElement('svg', {
        xmlns: 'http://www.w3.org/2000/svg',
        width: size,
        height: size,
        viewBox: '0 0 24 24',
        fill: 'none',
        stroke: color,
        strokeWidth: 2,
        strokeLinecap: 'round',
        strokeLinejoin: 'round',
        ...props
      }, React.createElement('path', { d }));
    };
    const IconMap = {
      Calculator: makeIcon('M4 2v20l16-10L4 2z'),
      Search: makeIcon('M11 11a8 8 0 1 0 0 0m10 10-4.35-4.35'),
      Heart: makeIcon('M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z'),
      Activity: makeIcon('M22 12h-2.44a2 2 0 0 0-1.86 1.16l-2.14 5.14a2 2 0 0 1-1.86 1.16H8.56a2 2 0 0 1-1.86-1.16L4.56 13.16A2 2 0 0 0 2.7 12H2'),
      Droplet: makeIcon('M12 22a7 7 0 0 1-7-7c0-2 1-3.78 2.29-5.5L12 2l4.71 7.5A5.03 5.03 0 0 1 19 15a7 7 0 0 1-7 7z'),
      Brain: makeIcon('M12 4.5a7.5 7.5 0 0 0-7.5 7.5c0 2.21 1.79 4 4 4a2.5 2.5 0 1 0 5 0c2.21 0 4-1.79 4-4a7.5 7.5 0 0 0-7.5-7.5z M12 16v4M12 4v4'),
      Wind: makeIcon('M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H16a2 2 0 0 0-1.4.6l-3.6 3.6a2 2 0 1 1-2.8-2.8l3.6-3.6a2 2 0 0 0 .6-1.4H5.5a2.5 2.5 0 1 1 0-5h13a2.5 2.5 0 0 1 1.8 4.3Z M13 19.7a2.5 2.5 0 1 1 1.8-4.3H12a2 2 0 0 0-1.4-.6l-3.6-3.6a2 2 0 1 1-2.8 2.8l3.6 3.6a2 2 0 0 0 .6 1.4h6.5a2.5 2.5 0 0 1 1.8 4.3Z'),
      Pill: makeIcon('M4.5 12.75a6.75 6.75 0 1 0 13.5 0 6.75 6.75 0 0 0-13.5 0Z M12 4.5v15'),
      Users: makeIcon('M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 1 0 0 M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75'),
      Stethoscope: makeIcon('M4.5 12.5 6 11c1.5-1.5 3.5-1.5 5 0l1.5 1.5 M12 22s5.5-4 5.5-10V7h-2v5c0 .5-.5 1-1 1H8c-.5 0-1-.5-1-1V7H5v5c0 6 5.5 10 5.5 10Z'),
      Baby: makeIcon('M9 12h.01 M15 12h.01 M12 12c2.5 0 5-1.9 5-4.5S14.5 3 12 3 7 4.9 7 7.5 9.5 12 12 12Z M20 18h-1.5a.5.5 0 0 0-.49.55c.02.43-.22.82-.6.97a8.5 8.5 0 0 1-6.82 0c-.38-.15-.62-.54-.6-.97A.5.5 0 0 0 10.5 18H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2Z')
    };
    // --- FULL CALCULATORS_DB (54 + 21 calculators) ---
    const CALCULATORS_DB = {
      grace: {
        name: 'GRACE',
        category: 'Cardiology',
        desc: 'Risk assessment in ACS',
        icon: 'Heart',
        fields: [
          { id: 'age', label: 'Age', type: 'number', unit: 'y.o.' },
          { id: 'hr', label: 'HR', type: 'number', unit: 'bpm' },
          { id: 'sbp', label: 'SBP', type: 'number', unit: 'mmHg' },
          { id: 'cr', label: 'Creatinine', type: 'number', unit: 'µmol/L' },
          { id: 'killip', label: 'Killip Class', type: 'select', options: [
            { value: '1', label: 'I' }, { value: '2', label: 'II' }, { value: '3', label: 'III' }, { value: '4', label: 'IV' }
          ]},
          { id: 'arrest', label: 'Cardiac arrest', type: 'checkbox' },
          { id: 'st', label: 'ST elevation', type: 'checkbox' },
          { id: 'troponin', label: 'Troponin', type: 'checkbox' }
        ],
        calculate: (data) => {
          let s = 0;
          const age = parseInt(data.age);
          if (age < 40) s += 0; else if (age < 50) s += 18; else if (age < 60) s += 36;
          else if (age < 70) s += 55; else if (age < 80) s += 73; else s += 91;
          const hr = parseInt(data.hr);
          if (hr < 70) s += 0; else if (hr < 90) s += 7; else if (hr < 110) s += 13;
          else if (hr < 150) s += 23; else s += 36;
          const sbp = parseInt(data.sbp);
          if (sbp < 80) s += 63; else if (sbp < 100) s += 58; else if (sbp < 120) s += 47;
          else if (sbp < 140) s += 37; else if (sbp < 160) s += 26; else if (sbp < 200) s += 11;
          const cr = parseFloat(data.cr);
          if (cr < 35.3) s += 2; else if (cr < 70.7) s += 5; else if (cr < 106) s += 8;
          else if (cr < 141.4) s += 11; else s += 14;
          s += (parseInt(data.killip) - 1) * 20;
          if (data.arrest) s += 43; if (data.st) s += 30; if (data.troponin) s += 15;
          let risk = '', color = '', mortality = '';
          if (s < 109) { risk = 'Low'; color = 'green'; mortality = '<1%'; }
          else if (s < 140) { risk = 'Moderate'; color = 'yellow'; mortality = '1-3%'; }
          else { risk = 'High'; color = 'red'; mortality = '>3%'; }
          return { score: s, result: risk, color, details: `Mortality: ${mortality}` };
        }
      },
      cha2ds2vasc: {
        name: 'CHA2DS2-VASc',
        category: 'Cardiology',
        desc: 'Stroke risk in Afib',
        icon: 'Brain',
        fields: [
          { id: 'chf', label: 'CHF', type: 'checkbox' },
          { id: 'ht', label: 'Hypertension', type: 'checkbox' },
          { id: 'age', label: 'Age', type: 'select', options: [
            { value: '0', label: '<65' }, { value: '1', label: '65-74' }, { value: '2', label: '75+' }
          ]},
          { id: 'dm', label: 'Diabetes', type: 'checkbox' },
          { id: 'stroke', label: 'Stroke/TIA', type: 'checkbox' },
          { id: 'vasc', label: 'Vascular disease', type: 'checkbox' },
          { id: 'sex', label: 'Sex', type: 'select', options: [
            { value: '0', label: 'Male' }, { value: '1', label: 'Female' }
          ]}
        ],
        calculate: (data) => {
          let s = 0;
          if (data.chf) s += 1; if (data.ht) s += 1;
          s += parseInt(data.age);
          if (data.dm) s += 1; if (data.stroke) s += 2; if (data.vasc) s += 1;
          s += parseInt(data.sex);
          let risk = '', color = '', rec = '';
          if (s === 0) { risk = 'Low (0%)'; color = 'green'; rec = 'No anticoagulation'; }
          else if (s === 1) { risk = 'Moderate (1.3%)'; color = 'yellow'; rec = 'Consider'; }
          else { risk = `High (${(s * 1.5).toFixed(1)}%)`; color = 'red'; rec = 'Anticoagulation indicated'; }
          return { score: s, result: risk, color, details: rec };
        }
      },
      glasgow: {
        name: 'Glasgow Coma Scale',
        category: 'Neurology',
        desc: 'Level of consciousness',
        icon: 'Brain',
        fields: [
          { id: 'eye', label: 'Eyes', type: 'select', options: [
            { value: '4', label: 'Spontaneous (4)' }, { value: '3', label: 'To voice (3)' },
            { value: '2', label: 'To pain (2)' }, { value: '1', label: 'None (1)' }
          ]},
          { id: 'verbal', label: 'Verbal', type: 'select', options: [
            { value: '5', label: 'Oriented (5)' }, { value: '4', label: 'Confused (4)' },
            { value: '3', label: 'Inappropriate (3)' }, { value: '2', label: 'Sounds (2)' }, { value: '1', label: 'None (1)' }
          ]},
          { id: 'motor', label: 'Motor', type: 'select', options: [
            { value: '6', label: 'Commands (6)' }, { value: '5', label: 'Localizes (5)' },
            { value: '4', label: 'Withdrawal (4)' }, { value: '3', label: 'Flexion (3)' },
            { value: '2', label: 'Extension (2)' }, { value: '1', label: 'None (1)' }
          ]}
        ],
        calculate: (data) => {
          const s = parseInt(data.eye) + parseInt(data.verbal) + parseInt(data.motor);
          let severity = '', color = '';
          if (s >= 13) { severity = 'Mild TBI'; color = 'green'; }
          else if (s >= 9) { severity = 'Moderate TBI'; color = 'yellow'; }
          else { severity = 'Severe TBI'; color = 'red'; }
          return { score: s, result: severity, color, details: 'of 15' };
        }
      },
      wellspe: {
        name: 'Wells PE',
        category: 'Pulmonology',
        desc: 'PE probability',
        icon: 'Wind',
        fields: [
          { id: 'dvt', label: 'DVT signs (+3)', type: 'checkbox' },
          { id: 'alt', label: 'Alternative dx (-3)', type: 'checkbox' },
          { id: 'tachy', label: 'HR >100 (+1.5)', type: 'checkbox' },
          { id: 'immob', label: 'Immobilization (+1.5)', type: 'checkbox' },
          { id: 'prior', label: 'Prior DVT/PE (+1.5)', type: 'checkbox' },
          { id: 'hemo', label: 'Hemoptysis (+1)', type: 'checkbox' },
          { id: 'cancer', label: 'Malignancy (+1)', type: 'checkbox' }
        ],
        calculate: (data) => {
          let s = 0;
          if (data.dvt) s += 3; if (data.alt) s -= 3; if (data.tachy) s += 1.5;
          if (data.immob) s += 1.5; if (data.prior) s += 1.5; if (data.hemo) s += 1;
          if (data.cancer) s += 1;
          let risk = '', prob = '', color = '';
          if (s < 2) { risk = 'Low'; prob = '1.3%'; color = 'green'; }
          else if (s <= 6) { risk = 'Moderate'; prob = '16%'; color = 'yellow'; }
          else { risk = 'High'; prob = '41%'; color = 'red'; }
          return { score: s, result: risk, color, details: `Probability: ${prob}` };
        }
      },
      ckdepi: {
        name: 'GFR (CKD-EPI)',
        category: 'Nephrology',
        desc: 'Kidney function',
        icon: 'Droplet',
        fields: [
          { id: 'creat', label: 'Creatinine', type: 'number', unit: 'µmol/L' },
          { id: 'age', label: 'Age', type: 'number', unit: 'y.o.' },
          { id: 'sex', label: 'Sex', type: 'select', options: [
            { value: 'male', label: 'Male' }, { value: 'female', label: 'Female' }
          ]}
        ],
        calculate: (data) => {
          const cr = parseFloat(data.creat) / 88.4;
          const age = parseInt(data.age);
          const k = data.sex === 'female' ? 0.7 : 0.9;
          const a = data.sex === 'female' ? -0.329 : -0.411;
          const minVal = Math.min(cr / k, 1);
          const maxVal = Math.max(cr / k, 1);
          let gfr = 141 * Math.pow(minVal, a) * Math.pow(maxVal, -1.209) * Math.pow(0.993, age);
          if (data.sex === 'female') gfr *= 1.018;
          gfr = Math.round(gfr);
          let stage = '', color = '';
          if (gfr >= 90) { stage = 'CKD G1'; color = 'green'; }
          else if (gfr >= 60) { stage = 'CKD G2'; color = 'green'; }
          else if (gfr >= 45) { stage = 'CKD G3a'; color = 'yellow'; }
          else if (gfr >= 30) { stage = 'CKD G3b'; color = 'orange'; }
          else if (gfr >= 15) { stage = 'CKD G4'; color = 'red'; }
          else { stage = 'CKD G5'; color = 'red'; }
          return { score: gfr, result: stage, color, details: 'mL/min/1.73m²' };
        }
      },
      bmi: {
        name: 'BMI',
        category: 'General',
        desc: 'Body Mass Index',
        icon: 'Activity',
        fields: [
          { id: 'height', label: 'Height', type: 'number', unit: 'cm' },
          { id: 'weight', label: 'Weight', type: 'number', unit: 'kg' }
        ],
        calculate: (data) => {
          const h = parseFloat(data.height) / 100;
          const w = parseFloat(data.weight);
          const bmi = (w / (h * h)).toFixed(1);
          const bsa = Math.sqrt((parseFloat(data.height) * w) / 3600).toFixed(2);
          let cat = '', color = '';
          if (bmi < 18.5) { cat = 'Underweight'; color = 'blue'; }
          else if (bmi < 25) { cat = 'Normal'; color = 'green'; }
          else if (bmi < 30) { cat = 'Overweight'; color = 'yellow'; }
          else { cat = 'Obesity'; color = 'red'; }
          return { score: bmi, result: cat, color, details: `BSA: ${bsa} m²` };
        }
      },
      curb65: {
        name: 'CURB-65',
        category: 'Pulmonology',
        desc: 'Pneumonia severity',
        icon: 'Wind',
        fields: [
          { id: 'conf', label: 'Confusion', type: 'checkbox' },
          { id: 'urea', label: 'BUN >7', type: 'checkbox' },
          { id: 'rr', label: 'RR ≥30', type: 'checkbox' },
          { id: 'bp', label: 'SBP <90 or DBP ≤60', type: 'checkbox' },
          { id: 'age', label: 'Age ≥65', type: 'checkbox' }
        ],
        calculate: (data) => {
          let s = 0;
          if (data.conf) s++; if (data.urea) s++; if (data.rr) s++; if (data.bp) s++; if (data.age) s++;
          let risk = '', mort = '', rec = '', color = '';
          if (s <= 1) { risk = 'Low'; mort = '1.5%'; rec = 'Outpatient'; color = 'green'; }
          else if (s === 2) { risk = 'Moderate'; mort = '9%'; rec = 'Inpatient'; color = 'yellow'; }
          else { risk = 'High'; mort = '22%'; rec = 'ICU'; color = 'red'; }
          return { score: s, result: risk, color, details: `${mort} • ${rec}` };
        }
      },
      childpugh: {
        name: 'Child-Pugh',
        category: 'Gastroenterology',
        desc: 'Liver cirrhosis',
        icon: 'Activity',
        fields: [
          { id: 'bili', label: 'Bilirubin', type: 'select', options: [
            { value: '1', label: '<34 (1)' }, { value: '2', label: '34-51 (2)' }, { value: '3', label: '>51 (3)' }
          ]},
          { id: 'alb', label: 'Albumin', type: 'select', options: [
            { value: '1', label: '>35 (1)' }, { value: '2', label: '28-35 (2)' }, { value: '3', label: '<28 (3)' }
          ]},
          { id: 'inr', label: 'INR', type: 'select', options: [
            { value: '1', label: '<1.7 (1)' }, { value: '2', label: '1.7-2.3 (2)' }, { value: '3', label: '>2.3 (3)' }
          ]},
          { id: 'ascites', label: 'Ascites', type: 'select', options: [
            { value: '1', label: 'None (1)' }, { value: '2', label: 'Mild (2)' }, { value: '3', label: 'Severe (3)' }
          ]},
          { id: 'enceph', label: 'Encephalopathy', type: 'select', options: [
            { value: '1', label: 'None (1)' }, { value: '2', label: '1-2 (2)' }, { value: '3', label: '3-4 (3)' }
          ]}
        ],
        calculate: (data) => {
          const s = parseInt(data.bili) + parseInt(data.alb) + parseInt(data.inr) + parseInt(data.ascites) + parseInt(data.enceph);
          let cl = '', surv = '', color = '';
          if (s <= 6) { cl = 'Class A'; surv = '85%'; color = 'green'; }
          else if (s <= 9) { cl = 'Class B'; surv = '60%'; color = 'yellow'; }
          else { cl = 'Class C'; surv = '35%'; color = 'red'; }
          return { score: s, result: cl, color, details: `2-year survival: ${surv}` };
        }
      },
      sofa: {
        name: 'SOFA',
        category: 'Critical Care',
        desc: 'Organ failure',
        icon: 'Stethoscope',
        fields: [
          { id: 'pao2', label: 'PaO2/FiO2', type: 'select', options: [
            { value: '0', label: '≥400 (0)' }, { value: '1', label: '<400 (1)' }, { value: '2', label: '<300 (2)' },
            { value: '3', label: '<200 MV (3)' }, { value: '4', label: '<100 MV (4)' }
          ]},
          { id: 'plt', label: 'Platelets', type: 'select', options: [
            { value: '0', label: '≥150 (0)' }, { value: '1', label: '<150 (1)' }, { value: '2', label: '<100 (2)' },
            { value: '3', label: '<50 (3)' }, { value: '4', label: '<20 (4)' }
          ]},
          { id: 'bili', label: 'Bilirubin', type: 'select', options: [
            { value: '0', label: '<1.2 (0)' }, { value: '1', label: '1.2-1.9 (1)' }, { value: '2', label: '2-5.9 (2)' },
            { value: '3', label: '6-11.9 (3)' }, { value: '4', label: '≥12 (4)' }
          ]},
          { id: 'map', label: 'MAP/Vasopressors', type: 'select', options: [
            { value: '0', label: 'MAP ≥70 (0)' }, { value: '1', label: 'MAP <70 (1)' }, { value: '2', label: 'Dopamine ≤5 (2)' },
            { value: '3', label: 'Dopamine >5 (3)' }, { value: '4', label: 'Dopamine >15 (4)' }
          ]},
          { id: 'gcs', label: 'GCS', type: 'select', options: [
            { value: '0', label: '15 (0)' }, { value: '1', label: '13-14 (1)' }, { value: '2', label: '10-12 (2)' },
            { value: '3', label: '6-9 (3)' }, { value: '4', label: '<6 (4)' }
          ]},
          { id: 'cr', label: 'Creatinine', type: 'select', options: [
            { value: '0', label: '<1.2 (0)' }, { value: '1', label: '1.2-1.9 (1)' }, { value: '2', label: '2-3.4 (2)' },
            { value: '3', label: '3.5-4.9 (3)' }, { value: '4', label: '≥5 (4)' }
          ]}
        ],
        calculate: (data) => {
          const s = parseInt(data.pao2) + parseInt(data.plt) + parseInt(data.bili) + parseInt(data.map) + parseInt(data.gcs) + parseInt(data.cr);
          let mort = '', color = '';
          if (s < 2) { mort = '<10%'; color = 'green'; }
          else if (s < 6) { mort = '15-20%'; color = 'yellow'; }
          else if (s < 11) { mort = '40-50%'; color = 'orange'; }
          else { mort = '>80%'; color = 'red'; }
          return { score: s, result: `${s} points`, color, details: `Mortality: ${mort}` };
        }
      },
      apgar: {
        name: 'Apgar Score',
        category: 'Pediatrics',
        desc: 'Newborn status',
        icon: 'Baby',
        fields: [
          { id: 'hr', label: 'HR', type: 'select', options: [
            { value: '0', label: 'None (0)' }, { value: '1', label: '<100 (1)' }, { value: '2', label: '≥100 (2)' }
          ]},
          { id: 'resp', label: 'Respiration', type: 'select', options: [
            { value: '0', label: 'None (0)' }, { value: '1', label: 'Weak (1)' }, { value: '2', label: 'Good (2)' }
          ]},
          { id: 'muscle', label: 'Muscle tone', type: 'select', options: [
            { value: '0', label: 'Flaccid (0)' }, { value: '1', label: 'Some flexion (1)' }, { value: '2', label: 'Active motion (2)' }
          ]},
          { id: 'reflex', label: 'Reflexes', type: 'select', options: [
            { value: '0', label: 'None (0)' }, { value: '1', label: 'Grimace (1)' }, { value: '2', label: 'Cry (2)' }
          ]},
          { id: 'color', label: 'Color', type: 'select', options: [
            { value: '0', label: 'Cyanosis (0)' }, { value: '1', label: 'Acrocyanosis (1)' }, { value: '2', label: 'Pink (2)' }
          ]}
        ],
        calculate: (data) => {
          const s = parseInt(data.hr) + parseInt(data.resp) + parseInt(data.muscle) + parseInt(data.reflex) + parseInt(data.color);
          let st = '', color = '';
          if (s >= 7) { st = 'Satisfactory'; color = 'green'; }
          else if (s >= 4) { st = 'Moderate asphyxia'; color = 'yellow'; }
          else { st = 'Severe asphyxia'; color = 'red'; }
          return { score: s, result: st, color, details: 'of 10' };
        }
      },
      hasbled: {
        name: 'HAS-BLED',
        category: 'Cardiology',
        desc: 'Bleeding risk',
        icon: 'Droplet',
        fields: [
          { id: 'ht', label: 'Hypertension (+1)', type: 'checkbox' },
          { id: 'renal', label: 'Renal dysfunction (+1)', type: 'checkbox' },
          { id: 'liver', label: 'Hepatic dysfunction (+1)', type: 'checkbox' },
          { id: 'stroke', label: 'Stroke (+1)', type: 'checkbox' },
          { id: 'bleeding', label: 'Bleeding (+1)', type: 'checkbox' },
          { id: 'inr', label: 'Labile INR (+1)', type: 'checkbox' },
          { id: 'age', label: 'Age >65 (+1)', type: 'checkbox' },
          { id: 'drugs', label: 'NSAIDs (+1)', type: 'checkbox' },
          { id: 'alcohol', label: 'Alcohol (+1)', type: 'checkbox' }
        ],
        calculate: (data) => {
          let s = 0;
          if (data.ht) s++; if (data.renal) s++; if (data.liver) s++; if (data.stroke) s++;
          if (data.bleeding) s++; if (data.inr) s++; if (data.age) s++; if (data.drugs) s++; if (data.alcohol) s++;
          let risk = '', color = '';
          if (s <= 1) { risk = 'Low (1%)'; color = 'green'; }
          else if (s === 2) { risk = 'Moderate (2%)'; color = 'yellow'; }
          else if (s === 3) { risk = 'High (4%)'; color = 'orange'; }
          else { risk = 'Very high (9%)'; color = 'red'; }
          return { score: s, result: risk, color, details: 'Bleeding risk/year' };
        }
      },
      heart: {
        name: 'HEART Score',
        category: 'Cardiology',
        desc: 'Chest pain',
        icon: 'Heart',

            color = 'green';
          }
          return { score: ph.toFixed(2), result: interpretation, color, details: `pH: ${ph}, PaCO2: ${pco2}, HCO3: ${hco3}` };
        }
      },
      serumOsmolality: {
        name: 'Serum osmolality',
        category: 'Nephrology',
        desc: 'Osmolality calculation',
        icon: 'Droplet',
        fields: [
          { id: 'na', label: 'Sodium', type: 'number', unit: 'mmol/L' },
          { id: 'glu', label: 'Glucose', type: 'number', unit: 'mg/dL' },
          { id: 'bun', label: 'BUN', type: 'number', unit: 'mg/dL' },
          { id: 'etoh', label: 'Ethanol (opt.)', type: 'number', unit: 'mg/dL' }
        ],
        calculate: (data) => {
          const na = parseFloat(data.na);
          const glu = parseFloat(data.glu);
          const bun = parseFloat(data.bun);
          const etoh = parseFloat(data.etoh) || 0;
          const osm = 2 * na + glu / 18 + bun / 2.8 + etoh / 4.6;
          const osmCalc = Math.round(osm);
          let gap = '', color = 'green';
          if (osmCalc > 320) { gap = 'Hyperosmolarity'; color = 'red'; }
          else if (osmCalc < 275) { gap = 'Hypoosmolarity'; color = 'blue'; }
          else { gap = 'Normal'; }
          return { score: osmCalc, result: gap, color, details: 'mOsm/kg' };
        }
      },
      steroidConversion: {
        name: 'Steroid conversion',
        category: 'Endocrinology',
        desc: 'Glucocorticoid equivalents',
        icon: 'Pill',
        fields: [
          { id: 'from', label: 'Source drug', type: 'select', options: [
            { value: 'hydrocortisone', label: 'Hydrocortisone' },
            { value: 'prednisone', label: 'Prednisone' },
            { value: 'methylpred', label: 'Methylprednisolone' },
            { value: 'dexamethasone', label: 'Dexamethasone' }
          ]},
          { id: 'dose', label: 'Dose', type: 'number', unit: 'mg' }
        ],
        calculate: (data) => {
          const dose = parseFloat(data.dose);
          const factors = {
            hydrocortisone: 1,
            prednisone: 4,
            methylpred: 5,
            dexamethasone: 25
          };
          const hydroEq = dose * factors[data.from];
          return { score: hydroEq.toFixed(1), result: `${hydroEq.toFixed(1)} mg hydrocortisone`, color: 'green', details: 'Equivalent' };
        }
      },
      mme: {
        name: 'Morphine MME',
        category: 'Anesthesiology',
        desc: 'Morphine equivalents',
        icon: 'Pill',
        fields: [
          { id: 'drug', label: 'Opioid', type: 'select', options: [
            { value: 'morphine', label: 'Morphine' },
            { value: 'oxycodone', label: 'Oxycodone' },
            { value: 'hydromorphone', label: 'Hydromorphone' },
            { value: 'fentanyl', label: 'Fentanyl (mcg/day)' }
          ]},
          { id: 'dose', label: 'Daily dose', type: 'number' }
        ],
        calculate: (data) => {
          const dose = parseFloat(data.dose);
          const factors = {
            morphine: 1,
            oxycodone: 1.5,
            hydromorphone: 4,
            fentanyl: 0.1 // mcg/day → mg morphine
          };
          const mme = dose * factors[data.drug];
          let risk = '', color = 'green';
          if (mme >= 50) { risk = 'High risk'; color = 'red'; }
          else if (mme >= 20) { risk = 'Moderate risk'; color = 'yellow'; }
          return { score: mme.toFixed(1), result: `${mme.toFixed(1)} MME/day`, color, details: risk };
        }
      },
      pecarn: {
        name: 'PECARN (pediatric)',
        category: 'Pediatrics',
        desc: 'Head trauma in children',
        icon: 'Baby',
        fields: [
          { id: 'age', label: 'Age', type: 'select', options: [
            { value: 'young', label: '<2 y.o.' }, { value: 'old', label: '≥2 y.o.' }
          ]},
          { id: 'gcs', label: 'GCS <15', type: 'checkbox' },
          { id: 'scalp', label: 'Scalp hematoma', type: 'checkbox' },
          { id: 'vomit', label: 'Vomiting', type: 'checkbox' },
          { id: 'seizure', label: 'Seizure', type: 'checkbox' },
          { id: 'loss', label: 'Loss of consciousness', type: 'checkbox' }
        ],
        calculate: (data) => {
          let highRisk = data.gcs || data.seizure || (data.age === 'young' && data.scalp);
          let result = highRisk ? 'CT indicated' : 'Low risk';
          let color = highRisk ? 'red' : 'green';
          return { score: highRisk ? 'Yes' : 'None', result, color, details: 'PECARN rule' };
        }
      },
      canadianCT: {
        name: 'Canadian CT Head Rule',
        category: 'Neurology',
        desc: 'Head trauma (adults)',
        icon: 'Brain',
        fields: [
          { id: 'gcs', label: 'GCS <15 at 2h', type: 'checkbox' },
          { id: 'suspected', label: 'Suspected fracture', type: 'checkbox' },
          { id: 'vomit', label: 'Vomiting ≥2', type: 'checkbox' },
          { id: 'age65', label: 'Age ≥65', type: 'checkbox' },
          { id: 'headInjury', label: 'Injury above clavicle', type: 'checkbox' },
          { id: 'anticoag', label: 'Anticoagulants', type: 'checkbox' }
        ],
        calculate: (data) => {
          let highRisk = data.gcs || data.suspected;
          let mediumRisk = data.vomit || data.age65 || data.headInjury || data.anticoag;
          let needCT = highRisk || mediumRisk;
          return { score: needCT ? 'Yes' : 'None', result: needCT ? 'CT indicated' : 'CT not needed', color: needCT ? 'red' : 'green', details: 'Canadian Rule' };
        }
      },
      mdrd: {
        name: 'MDRD GFR',
        category: 'Nephrology',
        desc: 'Kidney function',
        icon: 'Droplet',
        fields: [
          { id: 'creat', label: 'Creatinine', type: 'number', unit: 'mg/dL' },
          { id: 'age', label: 'Age', type: 'number' },
          { id: 'sex', label: 'Sex', type: 'select', options: [{ value: 'male', label: 'Male' }, { value: 'female', label: 'Female' }] },
          { id: 'race', label: 'Race', type: 'select', options: [{ value: 'black', label: 'Black' }, { value: 'other', label: 'Other' }] }
        ],
        calculate: (data) => {
          const cr = parseFloat(data.creat);
          const age = parseFloat(data.age);
          const sex = data.sex === 'female' ? 0.742 : 1;
          const race = data.race === 'black' ? 1.212 : 1;
          const gfr = 175 * Math.pow(cr, -1.154) * Math.pow(age, -0.203) * sex * race;
          const gfrRounded = Math.round(gfr);
          let stage = '', color = '';
          if (gfrRounded >= 90) { stage = 'CKD G1'; color = 'green'; }
          else if (gfrRounded >= 60) { stage = 'CKD G2'; color = 'green'; }
          else if (gfrRounded >= 30) { stage = 'CKD G3'; color = 'yellow'; }
          else if (gfrRounded >= 15) { stage = 'CKD G4'; color = 'orange'; }
          else { stage = 'CKD G5'; color = 'red'; }
          return { score: gfrRounded, result: stage, color, details: 'mL/min/1.73m²' };
        }
      },
      adjBodyWeight: {
        name: 'Adjusted Body Weight',
        category: 'General',
        desc: 'Adjusted body weight',
        icon: 'Activity',
        fields: [
          { id: 'height', label: 'Height', type: 'number', unit: 'cm' },
          { id: 'actual', label: 'Actual weight', type: 'number', unit: 'kg' },
          { id: 'sex', label: 'Sex', type: 'select', options: [{ value: 'male', label: 'Male' }, { value: 'female', label: 'Female' }] }
        ],
        calculate: (data) => {
          const h = parseFloat(data.height);
          const actual = parseFloat(data.actual);
          const inches = h / 2.54;
          let ibw = data.sex === 'male' ? 50 + 2.3 * (inches - 60) : 45.5 + 2.3 * (inches - 60);
          ibw = Math.max(ibw, 0);
          const adj = ibw + 0.4 * (actual - ibw);
          return { score: adj.toFixed(1), result: `${adj.toFixed(1)} kg`, color: 'green', details: 'Adjusted body weight' };
        }
      },
      sodiumCorrectionRate: {
        name: 'Na correction rate',
        category: 'Nephrology',
        desc: 'Hypo-/hypernatremia',
        icon: 'Droplet',
        fields: [
          { id: 'current', label: 'Current Na', type: 'number', unit: 'mmol/L' },
          { id: 'target', label: 'Target Na', type: 'number', unit: 'mmol/L' },
          { id: 'hours', label: 'Hours', type: 'number', unit: 'hr' }
        ],
        calculate: (data) => {
          const cur = parseFloat(data.current);
          const targ = parseFloat(data.target);
          const hrs = parseFloat(data.hours);
          const rate = Math.abs(targ - cur) / hrs;
          let safe = '', color = 'green';
          if (rate > 8) { safe = 'Dangerously fast!'; color = 'red'; }
          else if (rate > 6) { safe = 'Fast (caution)'; color = 'orange'; }
          else { safe = 'Safe'; }
          return { score: rate.toFixed(1), result: safe, color, details: `mmol/L/hr` };
        }
      },
      pregnancyDueDate: {
        name: 'Due date',
        category: 'Obstetrics',
        desc: "Naegele's rule",
        icon: 'Baby',
        fields: [
          { id: 'lmp', label: 'First day of last menstrual period', type: 'date' }
        ],
        calculate: (data) => {
          if (!data.lmp) return { score: '—', result: 'Enter date', color: 'gray', details: '' };
          const lmp = new Date(data.lmp);
          lmp.setDate(lmp.getDate() + 280);
          const options = { year: 'numeric', month: 'long', day: 'numeric' };
          const due = lmp.toLocaleDateString('ru-RU', options);
          return { score: due, result: due, color: 'green', details: 'Estimated due date' };
        }
      }
    };
    // --- MAIN COMPONENT ---
    const MedicalCalculators = () => {
      const [activeCalc, setActiveCalc] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [category, setCategory] = useState('all');
      const [formData, setFormData] = useState({});
      const [result, setResult] = useState(null);
      const categories = ['all', ...new Set(Object.values(CALCULATORS_DB).map(c => c.category))];
      const filteredCalcs = Object.entries(CALCULATORS_DB).filter(([id, calc]) => {
        const matchesSearch = calc.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                             calc.desc.toLowerCase().includes(searchTerm.toLowerCase());
        const matchesCategory = category === 'all' || calc.category === category;
        return matchesSearch && matchesCategory;
      });
      const handleInputChange = (fieldId, value) => {
        setFormData(prev => ({ ...prev, [fieldId]: value }));
        setResult(null);
      };
      const handleCalculate = () => {
        const calc = CALCULATORS_DB[activeCalc];
        if (calc) {
          const res = calc.calculate(formData);
          setResult(res);
        }
      };
      const handleReset = () => {
        setFormData({});
        setResult(null);
      };
      const renderField = (field) => {
        if (field.type === 'number') {
          return (
            <div key={field.id}>
              <label className="block text-sm font-medium mb-1">
                {field.label} {field.unit && <span className="text-gray-500">({field.unit})</span>}
              </label>
              <input
                type="number"
                value={formData[field.id] || ''}
                onChange={(e) => handleInputChange(field.id, e.target.value)}
                className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
              />
            </div>
          );
        }
        if (field.type === 'select') {
          return (
            <div key={field.id}>
              <label className="block text-sm font-medium mb-1">{field.label}</label>
              <select
                value={formData[field.id] || field.options[0].value}
                onChange={(e) => handleInputChange(field.id, e.target.value)}
                className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
              >
                {field.options.map(opt => (
                  <option key={opt.value} value={opt.value}>{opt.label}</option>
                ))}
              </select>
            </div>
          );
        }
        if (field.type === 'checkbox') {
          return (
            <label key={field.id} className="flex items-center">
              <input
                type="checkbox"
                checked={formData[field.id] || false}
                onChange={(e) => handleInputChange(field.id, e.target.checked)}
                className="mr-2"
              />
              <span className="text-sm">{field.label}</span>
            </label>
          );
        }
        if (field.type === 'date') {
          return (
            <div key={field.id}>
              <label className="block text-sm font-medium mb-1">{field.label}</label>
              <input
                type="date"
                value={formData[field.id] || ''}
                onChange={(e) => handleInputChange(field.id, e.target.value)}
                className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
              />
            </div>
          );
        }
      };
      const colorMap = {
        green: 'text-green-600',
        yellow: 'text-yellow-600',
        orange: 'text-orange-600',
        red: 'text-red-600',
        blue: 'text-blue-600',
        gray: 'text-gray-600'
      };
      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
          <div className="max-w-6xl mx-auto p-6">
            <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
              <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-white">
                <div className="flex items-center gap-3 mb-2">
                  <IconMap.Calculator size={40} />
                  <h1 className="text-4xl font-bold">MedCalculator</h1>
                </div>
                <p className="text-blue-100">Medical calculators and scales (75 calculators)</p>
              </div>
              <div className="p-6">
                {!activeCalc ? (
                  <>
                    <div className="mb-4 flex gap-2 overflow-x-auto pb-2">
                      {categories.map(cat => (
                        <button
                          key={cat}
                          onClick={() => setCategory(cat)}
                          className={`px-4 py-2 rounded-lg whitespace-nowrap ${
                            category === cat ? 'bg-blue-600 text-white' : 'bg-gray-200'
                          }`}
                        >
                          {cat === 'all' ? 'All' : cat}
                        </button>
                      ))}
                    </div>
                    <div className="mb-6 relative">
                      <IconMap.Search className="absolute left-3 top-3 text-gray-400" size={20} />
                      <input
                        type="text"
                        placeholder="Search calculator..."
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                        className="w-full pl-10 pr-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                      />
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                      {filteredCalcs.map(([id, calc]) => {
                        const Icon = IconMap[calc.icon] || IconMap.Calculator;
                        return (
                          <button
                            key={id}
                            onClick={() => {
                              setActiveCalc(id);
                              setFormData({});
                              setResult(null);
                            }}
                            className="p-6 border-2 rounded-xl hover:border-blue-500 hover:shadow-lg transition-all text-left group"
                          >
                            <div className="flex items-start gap-3">
                              <div className="p-3 bg-blue-50 rounded-lg group-hover:bg-blue-100">
                                <Icon className="text-blue-600" size={24} />
                              </div>
                              <div className="flex-1">
                                <div className="text-xs text-gray-500 mb-1">{calc.category}</div>
                                <h3 className="font-semibold text-gray-800 mb-1">{calc.name}</h3>
                                <p className="text-sm text-gray-600">{calc.desc}</p>
                              </div>
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  </>
                ) : (
                  <div>
                    <button
                      onClick={() => {
                        setActiveCalc(null);
                        handleReset();
                      }}
                      className="mb-4 text-blue-600 hover:text-blue-700 font-medium"
                    >
                      ← Back to list
                    </button>
                    <div className="bg-white rounded-xl border-2 p-6">
                      <div className="mb-6">
                        <div className="text-xs text-gray-500 mb-1">
                          {CALCULATORS_DB[activeCalc].category}
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800">
                          {CALCULATORS_DB[activeCalc].name}
                        </h2>
                        <p className="text-sm text-gray-600 mt-1">
                          {CALCULATORS_DB[activeCalc].desc}
                        </p>
                      </div>
                      <div className="space-y-4">
                        {CALCULATORS_DB[activeCalc].fields.map(field => renderField(field))}
                      </div>
                      <div className="flex gap-3 mt-6">
                        <button
                          onClick={handleCalculate}
                          className="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700"
                        >
                          Calculate
                        </button>
                        <button
                          onClick={handleReset}
                          className="px-6 bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300"
                        >
                          Reset
                        </button>
                      </div>
                      {result && (
                        <div className="mt-6 p-4 bg-gray-50 rounded-lg">
                          <div className="text-3xl font-bold text-gray-800">{result.score}</div>
                          <div className={`text-lg ${colorMap[result.color]} font-medium mt-2`}>
                            {result.result}
                          </div>
                          {result.details && (
                            <div className="text-sm text-gray-600 mt-2">{result.details}</div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="text-center mt-6 text-sm text-gray-600">
              <p>⚠️ For educational purposes only • Does not replace clinical judgment</p>
            </div>
          </div>
        </div>
      );
    };
    // --- INIT ---
    const root = createRoot(document.getElementById('root'));
    root.render(<MedicalCalculators />);
  </script>
  <!-- Service Worker for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
