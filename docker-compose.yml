services:
  nginx:
    image: nginx:stable-alpine
    container_name: doctor-opus-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
    depends_on:
      - medical-assistant-en
    networks:
      - doctor-opus-en
      - doctor-opus-shared

  db-en:
    image: postgres:15-alpine
    container_name: doctor-opus-db-en
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-neondb_owner}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password_here}
      - POSTGRES_DB=${POSTGRES_DATABASE:-neondb_en}
    volumes:
      - ./postgres_data_en:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  medical-assistant-en:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doctor-opus-app-en
    ports:
      - "3001:3000"
    environment:
      # === ОБЯЗАТЕЛЬНЫЕ ===
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - POSTGRES_URL=postgres://${POSTGRES_USER:-neondb_owner}:${POSTGRES_PASSWORD:-password_here}@db-en:5432/${POSTGRES_DATABASE:-neondb_en}
      
      # === АВТОРИЗАЦИЯ И БЕЗОПАСНОСТЬ (v3.42.0) ===
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - VIP_EMAILS=${VIP_EMAILS:-}
      - NEXT_PUBLIC_VIP_EMAILS=${NEXT_PUBLIC_VIP_EMAILS:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - JWT_MAX_AGE_SECONDS=${JWT_MAX_AGE_SECONDS:-86400}
      - MIGRATION_SECRET=${MIGRATION_SECRET}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT:-}
      
      # === ТРАНСКРИПЦИЯ ===
      - SPEECH_PROVIDER=${SPEECH_PROVIDER:-polza}
      - POLZA_BASE_URL=${POLZA_BASE_URL:-https://polza.ai/api/v1}
      - POLZA_API_KEY=${POLZA_API_KEY:-}
      - POLZA_STT_PRIMARY_MODEL=${POLZA_STT_PRIMARY_MODEL:-aiesa/transcribe}
      - POLZA_STT_FALLBACK_MODEL=${POLZA_STT_FALLBACK_MODEL:-openai/whisper-large-v3}
      - STT_POLZA_TIMEOUT_MS=${STT_POLZA_TIMEOUT_MS:-30000}
      - STT_ENABLE_DIARIZATION=${STT_ENABLE_DIARIZATION:-true}
      - STT_ROLE_DIARIZATION_ENABLED=${STT_ROLE_DIARIZATION_ENABLED:-true}
      - STT_ROLE_DIARIZATION_MODEL=${STT_ROLE_DIARIZATION_MODEL:-anthropic/claude-haiku-4.5}
      - STT_TIMEOUT_MS=${STT_TIMEOUT_MS:-280000}
      
      # === EMAIL ===
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-smtp}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      
      # === ПЛАТЕЖИ ===
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-nowpayments}
      - NEXT_PUBLIC_PAYMENT_PROVIDER=${NEXT_PUBLIC_PAYMENT_PROVIDER:-nowpayments}
      - NOWPAYMENTS_API_KEY=${NOWPAYMENTS_API_KEY:-}
      - NOWPAYMENTS_IPN_SECRET_KEY=${NOWPAYMENTS_IPN_SECRET_KEY:-}
      - CAPITALIST_MERCHANT_ID=${CAPITALIST_MERCHANT_ID:-}
      - CAPITALIST_SECRET=${CAPITALIST_SECRET:-}
      - ARSENALPAY_WIDGET_ID=${ARSENALPAY_WIDGET_ID:-}
      - ARSENALPAY_WIDGET_KEY=${ARSENALPAY_WIDGET_KEY:-}
      - ARSENALPAY_CALLBACK_KEY=${ARSENALPAY_CALLBACK_KEY:-}
      - ARSENALPAY_WIDGET_URL=${ARSENALPAY_WIDGET_URL:-}
      
      # === ПОДПИСКА ===
      - NEXT_PUBLIC_SUBSCRIPTION_STRICT_MODE=${NEXT_PUBLIC_SUBSCRIPTION_STRICT_MODE:-true}
      - GUEST_TRIAL_BALANCE=${GUEST_TRIAL_BALANCE:-10}
      - REGISTERED_BONUS=${REGISTERED_BONUS:-0}
      - INITIAL_BALANCE=${INITIAL_BALANCE:-10}
      - BILLING_SOFT_LIMIT=${BILLING_SOFT_LIMIT:-0}
      
      # === СИСТЕМНЫЕ ===
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
    restart: always
    depends_on:
      db-en:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    networks:
      - doctor-opus-en

networks:
  doctor-opus-en:
    external: true
    name: doctor-opus-en_default
  doctor-opus-shared:
    external: true
    name: doctor-opus_default
